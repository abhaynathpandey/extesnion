<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 260px;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117; color: #e6edf3;
}
.header {
  background: #161b22; padding: 14px 16px 10px;
  border-bottom: 1px solid #21262d;
}
.logo { display:flex; align-items:center; gap:8px; margin-bottom:2px; }
.logo-icon {
  width:28px; height:28px;
  background: linear-gradient(135deg,#00d9ff,#0066ff);
  border-radius:6px; display:flex; align-items:center;
  justify-content:center; font-size:14px; font-weight:800; color:#fff;
}
.logo-name { font-size:15px; font-weight:700; }
.logo-sub  { font-size:9px; color:#7d8590; letter-spacing:1px; text-transform:uppercase; }
.body { padding:14px 16px; display:flex; flex-direction:column; gap:8px; }
.btn {
  width:100%; padding:10px; border:none; border-radius:7px;
  font-size:13px; font-weight:600; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform:scale(.97); }
.btn-primary { background:linear-gradient(135deg,#00d9ff,#0066ff); color:#fff; }
.btn-secondary { background:#21262d; color:#c9d1d9; border:1px solid #30363d; }
.status { font-size:11px; color:#7d8590; text-align:center; padding:2px 0; min-height:16px; }
.status.ok  { color:#3fb950; }
.status.err { color:#f85149; }
.divider { height:1px; background:#21262d; }
.features { padding:0 4px; }
.feat { font-size:11px; color:#8b949e; padding:3px 0; display:flex; align-items:center; gap:6px; }
.dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.dot-g { background:#3fb950; } .dot-b { background:#00d9ff; } .dot-y { background:#d29922; }
.footer { padding:8px 16px; border-top:1px solid #21262d; }
.ver { font-size:10px; color:#484f58; text-align:center; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">P</div>
    <div>
      <div class="logo-name">DupCheck Evaluator</div>
      <div class="logo-sub">Duplicate Detection · No API</div>
    </div>
  </div>
</div>
<div class="body">
  <button class="btn btn-primary" id="activateBtn">⚡ Activate on This Page</button>
  <div class="status" id="status"></div>
  <div class="divider"></div>
  <div class="features">
    <div class="feat"><span class="dot dot-g"></span> Product Name differences</div>
    <div class="feat"><span class="dot dot-b"></span> Description differences</div>
    <div class="feat"><span class="dot dot-y"></span> Variant / Attribute differences</div>
    <div class="feat"><span class="dot dot-g"></span> SOP verdict (hardcoded rules)</div>
  </div>
</div>
<div class="footer">
  <div class="ver">DupCheck Evaluator v1.2 · Walmart Dups SOP Jan 2026</div>
</div>
<script src="popup.js"></script>
</body>
</html>
